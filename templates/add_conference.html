<!DOCTYPE html>
<html>

<head>

<title>Add Conference</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="form-section">

<h1>Add Conference</h1>

<form method="POST">

<label>Conference Name</label>
<input type="text" name="conference_name" required>

<label>Medical Specialty</label>
<input type="text" name="specialty" required>

<label>Country</label>
<input type="text" name="country" required>

<label>Venue</label>
<input type="text" name="venue" required>

<label>Conference Date</label>
<input type="date" name="conference_date" required>

<label>Organizer</label>
<input type="text" name="organizer" required>

<label>Registration Fee</label>
<input type="text" name="registration_fee" required>

<br><br>

<button type="submit">

Add Conference

</button>

</form>

</div>

</body>

</html>
