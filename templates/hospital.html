<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Registration</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav>

<div class="logo">
<h2>Dr Kairos GlobalConnect</h2>
</div>

<ul>

<li><a href="/">Home</a></li>
<li><a href="/registration">Registration</a></li>

</ul>

</nav>

<section class="form-section">

<h1>Hospital Registration</h1>

<p><b>Partnership Registration Fee: ₹777</b></p>

<form method="POST">

    <h2>Hospital Information</h2>

    <div class="form-row">
        <div class="form-group">
            <label>Hospital Name</label>
            <input type="text" name="hospital_name" required>
        </div>

        <div class="form-group">
            <label>Hospital Type</label>
            <input type="text" name="hospital_type" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Number of Beds</label>
            <input type="number" name="beds" required>
        </div>

        <div class="form-group">
            <label>Number of Doctors</label>
            <input type="number" name="doctors" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Specialties</label>
            <input type="text" name="specialties" placeholder="Cardiology, Neurology..." required>
        </div>

        <div class="form-group"></div>
    </div>

    <h2>Contact Person</h2>

    <div class="form-row">
        <div class="form-group">
            <label>Contact Name</label>
            <input type="text" name="contact_name" required>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input type="text" name="designation" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" name="mobile" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create Password" required>
        </div>

        <div class="form-group"></div>
    </div>

    <h2>Location</h2>

    <div class="form-row">
        <div class="form-group">
            <label>City</label>
            <input type="text" name="city" required>
        </div>

        <div class="form-group">
            <label>State</label>
            <input type="text" name="state" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Country</label>
            <input type="text" name="country" required>
        </div>

        <div class="form-group"></div>
    </div>

    <button type="submit" class="submit-btn">
        Register Now
    </button>

</form>
