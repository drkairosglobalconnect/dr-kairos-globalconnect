<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Registration</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav>

    <div class="logo">
        <a href="/">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Dr Kairos GlobalConnect Logo">
        </a>
        <h2>Dr Kairos GlobalConnect</h2>
    </div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/registration">Registration</a></li>
    </ul>

</nav>

<section class="doctor-form-container">

    <h1>Doctor Registration</h1>

    <p class="fee">Professional Registration Fee: <b>₹399</b></p>

    <form method="POST" enctype="multipart/form-data">

        <h2>Personal Details</h2>

        <div class="form-row">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter Full Name" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob">
            </div>

            <div class="form-group">
                <label>Nationality</label>
                <input type="text" name="nationality">
            </div>

        </div>

        <h2>Contact Details</h2>

        <div class="form-row">

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" name="mobile" required>
            </div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="tel" name="whatsapp" required>
            </div>

        </div>

        <h2>Professional Details</h2>

        <div class="form-row">

            <div class="form-group">
                <label>Medical Degree</label>
                <input type="text" name="degree_name">
            </div>

            <div class="form-group">
                <label>Specialty</label>
                <input type="text" name="specialty" required>
            </div>

            <div class="form-group">
                <label>Medical Registration Number</label>
                <input type="text" name="registration_number">
            </div>

            <div class="form-group">
                <label>Medical Council</label>
                <input type="text" name="medical_council">
            </div>

            <div class="form-group">
                <label>Years of Experience</label>
                <input type="number" name="experience" required>
            </div>

        </div>

        <h2>Hospital Details</h2>

        <div class="form-row">

            <div class="form-group">
                <label>Hospital Name</label>
                <input type="text" name="hospital" required>
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department">
            </div>

            <div class="form-group">
                <label>Designation</label>
                <input type="text" name="designation">
            </div>

        </div>

        <h2>Upload Documents</h2>

        <div class="form-row">

            <div class="form-group">
                <label>Degree Certificate</label>
                <input type="file" name="degree" required>
            </div>

            <div class="form-group">
                <label>Medical Registration Certificate</label>
                <input type="file" name="registration_certificate" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter Password" required>
            </div>

        </div>

        <button class="submit-btn" type="submit">
            Register Now - ₹399
        </button>

    </form>

</section>
