<!DOCTYPE html>
<html>

<head>

<title>Edit Hospital</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<section class="form-section">

<h1>Edit Hospital</h1>

<form method="POST">

<label>Hospital Name</label>
<input type="text"
name="hospital_name"
value="{{ hospital.hospital_name }}"
required>

<label>Contact Person</label>
<input type="text"
name="contact_person"
value="{{ hospital.contact_person }}"
required>

<label>Email</label>
<input type="email"
name="email"
value="{{ hospital.email }}"
required>

<label>Mobile</label>
<input type="text"
name="mobile"
value="{{ hospital.mobile }}"
required>

<label>Address</label>
<textarea
name="address"
required>{{ hospital.address }}</textarea>

<br><br>

<button type="submit">
Update Hospital
</button>

</form>

</section>

</body>
</html>
