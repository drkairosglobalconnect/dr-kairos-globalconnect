<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conference Organizer Registration</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav>

<div class="logo">
<h2>Dr Kairos GlobalConnect</h2>
</div>

<ul>
<li><a href="/">Home</a></li>
<li><a href="/registration">Registration</a></li>
</ul>

</nav>

<section class="doctor-form-container">

<div class="form-logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Dr Kairos GlobalConnect Logo">
</div>

<h1>Conference Organizer Registration</h1>

<p class="fee"><b>Partnership Registration Fee: ₹777</b></p>

<form method="POST">

<h2>Organization Information</h2>

<div class="form-row">

<div class="form-group">
<label>Organization Name</label>
<input type="text" name="organization_name" required>
</div>

<div class="form-group">
<label>Website</label>
<input type="url" name="website" placeholder="https://example.com">
</div>

</div>

<h2>Contact Person</h2>

<div class="form-row">

<div class="form-group">
<label>Contact Person</label>
<input type="text" name="contact_person" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" required>
</div>

</div>

<div class="form-row">

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" name="mobile" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Create Password" required>
</div>

</div>

<h2>Conference Details</h2>

<div class="form-row">

<div class="form-group">
<label>Conference Name</label>
<input type="text" name="conference_name" required>
</div>

<div class="form-group">
<label>Medical Specialty</label>
<input type="text" name="specialty" required>
</div>

</div>

<div class="form-row">

<div class="form-group">
<label>Country</label>
<input type="text" name="country" required>
</div>

<div class="form-group">
<label>Venue</label>
<input type="text" name="venue" required>
</div>

</div>

<div class="form-row">

<div class="form-group">
<label>Conference Date</label>
<input type="date" name="conference_date" required>
</div>

<div class="form-group">
<label>&nbsp;</label>
<input type="text" disabled style="visibility:hidden;">
</div>

</div>

<button type="submit" class="submit-btn">
Register Now
</button>

</form>

</section>

</body>

</html>
