<!DOCTYPE html>
<html>

<head>
    <title>Edit Conference</title>
</head>

<body>

<h2>Edit Conference</h2>

<form method="POST">

    <input type="text"
           name="conference_name"
           value="{{ conference.conference_name }}"
           required><br><br>

    <input type="text"
           name="specialty"
           value="{{ conference.specialty }}"
           required><br><br>

    <input type="text"
           name="country"
           value="{{ conference.country }}"
           required><br><br>

    <input type="text"
           name="venue"
           value="{{ conference.venue }}"
           required><br><br>

    <input type="date"
           name="conference_date"
           value="{{ conference.conference_date }}"
           required><br><br>

    <input type="text"
           name="organizer"
           value="{{ conference.organizer }}"
           required><br><br>

    <input type="text"
           name="registration_fee"
           value="{{ conference.registration_fee }}"
           required><br><br>

    <button type="submit">
        Update Conference
    </button>

</form>

</body>
</html>
