<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Student</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav>

    <div class="logo">
        <h2>Dr Kairos GlobalConnect</h2>
    </div>

</nav>

<section class="form-section">

<h1>Edit Student Registration</h1>

<form method="POST">

    <label>Full Name</label>
    <input type="text"
           name="full_name"
           value="{{ student.full_name }}"
           required>

    <label>Date of Birth</label>
    <input type="date"
           name="dob"
           value="{{ student.dob }}"
           required>

    <label>Gender</label>

    <select name="gender" required>

        <option value="Male"
        {% if student.gender=="Male" %}selected{% endif %}>
        Male
        </option>

        <option value="Female"
        {% if student.gender=="Female" %}selected{% endif %}>
        Female
        </option>

        <option value="Other"
        {% if student.gender=="Other" %}selected{% endif %}>
        Other
        </option>

    </select>

    <label>College Name</label>
    <input type="text"
           name="college"
           value="{{ student.college }}"
           required>

    <label>University</label>
    <input type="text"
           name="university"
           value="{{ student.university }}"
           required>

    <label>Course</label>
    <input type="text"
           name="course"
           value="{{ student.course }}"
           required>

    <label>Year of Study</label>
    <input type="text"
           name="year"
           value="{{ student.year }}"
           required>

    <label>Email</label>
    <input type="email"
           name="email"
           value="{{ student.email }}"
           required>

    <label>Mobile Number</label>
    <input type="text"
           name="mobile"
           value="{{ student.mobile }}"
           required>

    <label>WhatsApp Number</label>
    <input type="text"
           name="whatsapp"
           value="{{ student.whatsapp }}"
           required>

    <br><br>

    <button type="submit">
        Update Student
    </button>

</form>

</section>

</body>

</html>
